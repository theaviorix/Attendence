<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --holiday: #818cf8;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --present-glow: 0 0 12px rgba(74,222,128,0.4);
    --absent-glow: 0 0 12px rgba(248,113,113,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(124,106,247,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50%;
    height: 50%;
    background: radial-gradient(ellipse, rgba(247,106,138,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease;
  }

  .header-left h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    background: linear-gradient(135deg, #e8e8f0 30%, #7c6af7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-left p {
    font-family: 'Montserrat', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px;
    margin-bottom: 36px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 0 2px 2px 0;
  }

  .stat-card.present::before { background: var(--green); }
  .stat-card.absent::before { background: var(--red); }
  .stat-card.holiday::before { background: var(--holiday); }
  .stat-card.total::before { background: var(--accent); }
  .stat-card.percentage::before { background: var(--yellow); }

  .stat-label {
    font-family: 'Montserrat', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
  }

  .stat-card.present .stat-value { color: var(--green); }
  .stat-card.absent .stat-value { color: var(--red); }
  .stat-card.holiday .stat-value { color: var(--holiday); }
  .stat-card.total .stat-value { color: var(--text); }
  .stat-card.percentage .stat-value { color: var(--yellow); }

  /* PROGRESS BAR */
  .progress-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .progress-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Montserrat', monospace;
  }

  .progress-pct {
    font-size: 22px;
    font-weight: 800;
    color: var(--yellow);
  }

  .progress-track {
    height: 10px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    background: linear-gradient(90deg, var(--accent), var(--green));
    position: relative;
  }

  .progress-fill.warning { background: linear-gradient(90deg, var(--red), var(--yellow)); }
  .progress-fill.medium { background: linear-gradient(90deg, var(--yellow), #a3e635); }

  .progress-note {
    font-family: 'Montserrat', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    text-align: right;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease 0.25s both;
  }

  .btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 10px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #6b59e8; transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    color: var(--text);
    border-color: var(--border);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: transparent;
    color: var(--red);
    border-color: rgba(248,113,113,0.3);
  }
  .btn-danger:hover { background: rgba(248,113,113,0.1); }

  .btn-export {
    background: transparent;
    color: var(--green);
    border-color: rgba(74,222,128,0.3);
  }
  .btn-export:hover { background: rgba(74,222,128,0.1); transform: translateY(-1px); }

  .btn-import {
    background: transparent;
    color: var(--holiday);
    border-color: rgba(129,140,248,0.3);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
  }
  .btn-import:hover { background: rgba(129,140,248,0.1); transform: translateY(-1px); }

  .btn-export {
    background: transparent;
    color: var(--green);
    border-color: rgba(74,222,128,0.3);
  }
  .btn-export:hover { background: rgba(74,222,128,0.1); transform: translateY(-1px); }

  .btn-import {
    display: inline-flex;
    align-items: center;
    background: transparent;
    color: var(--holiday);
    border-color: rgba(129,140,248,0.3);
    cursor: pointer;
    user-select: none;
  }
  .btn-import:hover { background: rgba(129,140,248,0.1); transform: translateY(-1px); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    opacity: 0;
    pointer-events: none !important;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 999;
    white-space: nowrap;
    width: max-content;
    max-width: 90vw;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(74,222,128,0.5); color: var(--green); }
  .toast.error { border-color: rgba(248,113,113,0.5); color: var(--red); }

  /* MONTH NAV */
  .month-nav {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    margin-left: 0;
  }

  .month-nav button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: color 0.2s;
    padding: 0 4px;
  }
  .month-nav button:hover { color: var(--accent); }

  .month-label {
    font-weight: 700;
    font-size: 15px;
    min-width: 130px;
    text-align: center;
  }

  /* CALENDAR */
  .calendar-section {
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .calendar-header-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }

  .day-name {
    text-align: center;
    font-family: 'Montserrat', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 0;
  }

  .day-name.sunday { color: var(--red); opacity: 0.7; }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    min-height: 52px;
    font-size: 14px;
    font-weight: 600;
    overflow: hidden;
  }

  .day-cell:hover:not(.empty):not(.sunday-cell):not(.future) {
    border-color: var(--accent);
    transform: scale(1.05);
    z-index: 2;
  }

  .day-cell.empty { background: transparent; border-color: transparent; cursor: default; }

  .day-cell.sunday-cell {
    opacity: 0.3;
    cursor: not-allowed;
    border-style: dashed;
  }

  .day-cell.future {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .day-cell.today {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
  }

  .day-cell.present {
    background: rgba(74,222,128,0.12);
    border-color: rgba(74,222,128,0.5);
    box-shadow: var(--present-glow);
    color: var(--green);
  }

  .day-cell.absent {
    background: rgba(248,113,113,0.1);
    border-color: rgba(248,113,113,0.4);
    box-shadow: var(--absent-glow);
    color: var(--red);
  }

  .day-cell.holiday {
    background: rgba(129,140,248,0.1);
    border-color: rgba(129,140,248,0.4);
    cursor: default;
    color: var(--holiday);
  }

  .day-cell.holiday:hover { transform: none; }

  .day-num { font-size: 15px; font-weight: 700; line-height: 1; }

  .day-status-icon {
    font-size: 10px;
    margin-top: 3px;
    font-family: 'Montserrat', monospace;
    letter-spacing: 0px;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Montserrat', monospace;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 4px;
  }

  .legend-dot.present { background: var(--green); }
  .legend-dot.absent { background: var(--red); }
  .legend-dot.holiday { background: var(--holiday); }
  .legend-dot.sunday { background: var(--muted); opacity: 0.4; }
  .legend-dot.future { background: var(--surface2); border: 1px solid var(--border); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 90%;
    max-width: 420px;
    animation: scaleIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .modal h2 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .modal .modal-date {
    font-family: 'Montserrat', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .modal-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1.5px solid transparent;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-btn.present-btn {
    background: rgba(74,222,128,0.12);
    border-color: rgba(74,222,128,0.4);
    color: var(--green);
  }
  .modal-btn.present-btn:hover { background: rgba(74,222,128,0.22); }

  .modal-btn.absent-btn {
    background: rgba(248,113,113,0.1);
    border-color: rgba(248,113,113,0.35);
    color: var(--red);
  }
  .modal-btn.absent-btn:hover { background: rgba(248,113,113,0.2); }

  .modal-btn.holiday-btn {
    background: rgba(129,140,248,0.1);
    border-color: rgba(129,140,248,0.35);
    color: var(--holiday);
  }
  .modal-btn.holiday-btn:hover { background: rgba(129,140,248,0.2); }

  .modal-btn.clear-btn {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
  }
  .modal-btn.clear-btn:hover { border-color: var(--muted); color: var(--text); }

  .modal-close {
    margin-top: 12px;
    width: 100%;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Montserrat', monospace;
    font-size: 12px;
    cursor: pointer;
    padding: 8px;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }

  /* HOLIDAY NOTE MODAL */
  .holiday-note-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Montserrat', monospace;
    font-size: 13px;
    padding: 12px;
    margin-top: 12px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  .holiday-note-input:focus { border-color: var(--holiday); }

  /* TOOLTIP on hover */
  .day-cell .tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: 'Montserrat', monospace;
    color: var(--text);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }

  .day-cell:hover .tooltip { opacity: 1; }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.88); }
    to { opacity: 1; transform: scale(1); }
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .day-cell { min-height: 42px; font-size: 12px; border-radius: 8px; }
    .day-num { font-size: 12px; }
    .day-status-icon { font-size: 8px; }
    .controls { gap: 8px; }
    .btn { font-size: 12px; padding: 8px 14px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>Attendance Tracker</h1>
      <p>School Year · Starting April 20, 2026</p>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card present">
      <div class="stat-label">Present</div>
      <div class="stat-value" id="statPresent">0</div>
    </div>
    <div class="stat-card absent">
      <div class="stat-label">Absent</div>
      <div class="stat-value" id="statAbsent">0</div>
    </div>
    <div class="stat-card holiday">
      <div class="stat-label">Holidays</div>
      <div class="stat-value" id="statHoliday">0</div>
    </div>
    <div class="stat-card total">
      <div class="stat-label">Working Days</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card percentage">
      <div class="stat-label">Attendance %</div>
      <div class="stat-value" id="statPct">—</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-title">Attendance Rate</span>
      <span class="progress-pct" id="progressPct">—</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="progress-note" id="progressNote">Mark your attendance to see your rate</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">&#8592;</button>
      <span class="month-label" id="monthLabel">April 2026</span>
      <button onclick="changeMonth(1)">&#8594;</button>
    </div>
    <button class="btn btn-outline" onclick="markAllPresent()">✓ Mark All Present</button>
    <button class="btn btn-danger" onclick="resetMonth()">↺ Reset Month</button>
    <button class="btn btn-export" onclick="downloadData()">⬇ Export</button>
    <label class="btn btn-import" title="Load a previously exported .json file">
      ⬆ Import
      <input type="file" id="importInput" accept=".json" onchange="uploadData(event)" style="display:none;">
    </label>
  </div>

  <!-- CALENDAR -->
  <div class="calendar-section">
    <div class="calendar-header-row">
      <div class="day-name sunday">Sun</div>
      <div class="day-name">Mon</div>
      <div class="day-name">Tue</div>
      <div class="day-name">Wed</div>
      <div class="day-name">Thu</div>
      <div class="day-name">Fri</div>
      <div class="day-name">Sat</div>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot present"></div>Present</div>
      <div class="legend-item"><div class="legend-dot absent"></div>Absent</div>
      <div class="legend-item"><div class="legend-dot holiday"></div>Holiday</div>
      <div class="legend-item"><div class="legend-dot sunday"></div>Sunday (excluded)</div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Mark Attendance</h2>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-actions">
      <button class="modal-btn present-btn" onclick="setStatus('present')">
        <span>✓</span> Present
      </button>
      <button class="modal-btn absent-btn" onclick="setStatus('absent')">
        <span>✗</span> Absent
      </button>
      <button class="modal-btn holiday-btn" onclick="showHolidayNote()">
        <span>🎌</span> Mark as Holiday
      </button>
      <button class="modal-btn clear-btn" onclick="setStatus(null)">
        <span>○</span> Clear
      </button>
    </div>
    <div id="holidayNoteSection" style="display:none;">
      <textarea class="holiday-note-input" id="holidayNoteInput" rows="2" placeholder="Holiday name (optional)..."></textarea>
      <button class="modal-btn holiday-btn" onclick="confirmHoliday()">Confirm Holiday</button>
    </div>
    <button class="modal-close" onclick="closeModal()">ESC · close</button>
  </div>
</div>

<script>
  const START_DATE = new Date(2026, 3, 20); // April 20, 2026

  let currentYear = 2026;
  let currentMonth = 3; // 0-indexed: April = 3
  let selectedDate = null;

  // Load data from localStorage
  let data = JSON.parse(localStorage.getItem('attendanceData') || '{}');

  const monthNames = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function isBeforeStart(y, m, d) {
    const dt = new Date(y, m, d);
    return dt < START_DATE;
  }

  function isFuture(y, m, d) {
    const today = new Date();
    today.setHours(0,0,0,0);
    return new Date(y, m, d) > today;
  }

  function isToday(y, m, d) {
    const t = new Date();
    return t.getFullYear() === y && t.getMonth() === m && t.getDate() === d;
  }

  function isSunday(y, m, d) {
    return new Date(y, m, d).getDay() === 0;
  }

  function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    document.getElementById('monthLabel').textContent = `${monthNames[currentMonth]} ${currentYear}`;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    // Empty cells
    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const key = dateKey(currentYear, currentMonth, d);
      const dayData = data[key];
      const sunday = isSunday(currentYear, currentMonth, d);
      const future = isFuture(currentYear, currentMonth, d);
      const beforeStart = isBeforeStart(currentYear, currentMonth, d);
      const today = isToday(currentYear, currentMonth, d);

      let classes = ['day-cell'];
      if (sunday) classes.push('sunday-cell');
      else if (beforeStart || future) classes.push('future');
      else if (dayData) classes.push(dayData.status);
      if (today) classes.push('today');

      cell.className = classes.join(' ');

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = d;
      cell.appendChild(numEl);

      // Status icon
      if (dayData && !sunday) {
        const icon = document.createElement('div');
        icon.className = 'day-status-icon';
        if (dayData.status === 'present') icon.textContent = '✓';
        else if (dayData.status === 'absent') icon.textContent = '✗';
        else if (dayData.status === 'holiday') icon.textContent = dayData.note ? '🎌' : '🎌';
        cell.appendChild(icon);
      }

      // Tooltip for holiday
      if (dayData && dayData.status === 'holiday' && dayData.note) {
        const tt = document.createElement('div');
        tt.className = 'tooltip';
        tt.textContent = dayData.note;
        cell.appendChild(tt);
      }

      if (!sunday && !beforeStart && !future) {
        cell.addEventListener('click', () => openModal(currentYear, currentMonth, d));
      }

      grid.appendChild(cell);
    }

    updateStats();
  }

  function updateStats() {
    let present = 0, absent = 0, holiday = 0;

    // Count across ALL data
    Object.entries(data).forEach(([key, val]) => {
      if (val.status === 'present') present++;
      else if (val.status === 'absent') absent++;
      else if (val.status === 'holiday') holiday++;
    });

    const working = present + absent;
    const pct = working > 0 ? Math.round((present / working) * 100) : null;

    document.getElementById('statPresent').textContent = present;
    document.getElementById('statAbsent').textContent = absent;
    document.getElementById('statHoliday').textContent = holiday;
    document.getElementById('statTotal').textContent = working;

    if (pct !== null) {
      document.getElementById('statPct').textContent = pct + '%';
      document.getElementById('progressPct').textContent = pct + '%';

      const fill = document.getElementById('progressFill');
      fill.style.width = pct + '%';
      fill.className = 'progress-fill' + (pct < 60 ? ' warning' : pct < 80 ? ' medium' : '');

      const needed = Math.max(0, Math.ceil(0.80 * working) - present);
      if (pct >= 80) {
        document.getElementById('progressNote').textContent =
          'Great! You are above 80%. You can miss ' + Math.floor((present - 0.80 * working) / 0.80) + ' more day(s) and stay above 80%.';
      } else {
        document.getElementById('progressNote').textContent =
          'Need ' + needed + ' more present day(s) to reach 80% attendance.';
      }
    } else {
      document.getElementById('statPct').textContent = '—';
      document.getElementById('progressPct').textContent = '—';
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('progressNote').textContent = 'Mark your attendance to see your rate';
    }
  }

  function openModal(y, m, d) {
    selectedDate = { y, m, d };
    const key = dateKey(y, m, d);
    const dayData = data[key];
    document.getElementById('modalTitle').textContent = 'Mark Attendance';
    document.getElementById('modalDate').textContent =
      `${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(y,m,d).getDay()]}, ${monthNames[m]} ${d}, ${y}`;
    document.getElementById('holidayNoteSection').style.display = 'none';
    document.getElementById('holidayNoteInput').value = (dayData && dayData.note) || '';
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    selectedDate = null;
  }

  function setStatus(status) {
    if (!selectedDate) return;
    const key = dateKey(selectedDate.y, selectedDate.m, selectedDate.d);
    if (status === null) {
      delete data[key];
    } else {
      data[key] = { status };
    }
    saveData();
    renderCalendar();
    closeModal();
  }

  function showHolidayNote() {
    document.getElementById('holidayNoteSection').style.display = 'block';
    document.getElementById('holidayNoteInput').focus();
  }

  function confirmHoliday() {
    if (!selectedDate) return;
    const key = dateKey(selectedDate.y, selectedDate.m, selectedDate.d);
    const note = document.getElementById('holidayNoteInput').value.trim();
    data[key] = { status: 'holiday', note: note || '' };
    saveData();
    renderCalendar();
    closeModal();
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
  }

  function markAllPresent() {
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    for (let d = 1; d <= daysInMonth; d++) {
      if (isSunday(currentYear, currentMonth, d)) continue;
      if (isBeforeStart(currentYear, currentMonth, d)) continue;
      if (isFuture(currentYear, currentMonth, d)) continue;
      const key = dateKey(currentYear, currentMonth, d);
      if (!data[key] || data[key].status !== 'holiday') {
        data[key] = { status: 'present' };
      }
    }
    saveData();
    renderCalendar();
  }

  function resetMonth() {
    if (!confirm('Reset all attendance for this month?')) return;
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const key = dateKey(currentYear, currentMonth, d);
      delete data[key];
    }
    saveData();
    renderCalendar();
  }

  function saveData() {
    localStorage.setItem('attendanceData', JSON.stringify(data));
  }

  // ── EXPORT ──────────────────────────────────────────────
  function downloadData() {
    const exportObj = {
      version: 1,
      exportedAt: new Date().toISOString(),
      startDate: '2026-04-20',
      attendance: data
    };
    const jsonStr = JSON.stringify(exportObj, null, 2);
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const today = new Date();
    const fname = 'attendance_' + today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0') + '.json';
    const a = document.createElement('a');
    a.style.display = 'none';
    document.body.appendChild(a);
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = fname;
    a.click();
    setTimeout(function() {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);
    showToast('✓ Exported: ' + fname, 'success');
  }

  // ── IMPORT ──────────────────────────────────────────────
  function uploadData(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (!file.name.endsWith('.json')) {
      showToast('✗ Please select a .json file', 'error');
      event.target.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        const imported = parsed.attendance || parsed;
        if (typeof imported !== 'object' || Array.isArray(imported)) throw new Error('Invalid format');
        const keys = Object.keys(imported);
        if (keys.length > 0 && !/^\d{4}-\d{2}-\d{2}$/.test(keys[0])) throw new Error('Invalid format');
        if (!confirm(`This will replace your current data with ${keys.length} record(s) from the file. Continue?`)) {
          event.target.value = '';
          return;
        }
        // Clear existing keys and copy imported ones in-place
        // so all closures (setStatus, confirmHoliday, etc.) keep the same reference
        Object.keys(data).forEach(k => delete data[k]);
        Object.assign(data, imported);
        saveData();
        renderCalendar();
        showToast('✓ Imported ' + keys.length + ' record(s) — edit as normal!', 'success');
      } catch {
        showToast('✗ Invalid file format', 'error');
      }
      event.target.value = '';
    };
    reader.readAsText(file);
  }

  // ── TOAST ───────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // Init
  renderCalendar();
</script>
<div id="toast" class="toast" aria-live="polite"></div>
</body>
</html>
